<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Suizo — Opening Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1c0f08 0%, #4b2a18 40%, #8c5a32 100%);
      color: #fff7ef;
      position: relative;
    }

    .background {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 160, 0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 220, 180, 0.15), transparent 35%);
      z-index: 0;
    }

    .gold-line {
      position: absolute;
      width: 200%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 224, 170, 0.7), transparent);
      animation: float 12s linear infinite;
      opacity: 0.4;
    }

    .gold-line:nth-child(1) {
      top: 20%;
      left: -50%;
    }

    .gold-line:nth-child(2) {
      top: 60%;
      left: -30%;
      animation-duration: 18s;
    }

    @keyframes float {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(20%);
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      text-align: center;
      background: rgba(20, 10, 5, 0.45);
      border: 1px solid rgba(255, 220, 180, 0.18);
      backdrop-filter: blur(16px);
      padding: 70px 50px;
      border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ffe0aa;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .divider {
      width: 120px;
      height: 2px;
      margin: 0 auto 30px;
      background: linear-gradient(to right, transparent, #ffe0aa, transparent);
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #f6d1a7;
      margin-bottom: 35px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem;
      line-height: 1.1;
      margin-bottom: 24px;
      color: #fff7ef;
    }

    .description {
      max-width: 580px;
      margin: 0 auto;
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(255,247,239,0.85);
    }

    .badge {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 28px;
      border-radius: 999px;
      background: rgba(255, 224, 170, 0.12);
      border: 1px solid rgba(255, 224, 170, 0.25);
      color: #ffe0aa;
      font-weight: 600;
      letter-spacing: 1px;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 50px;
      font-size: 0.9rem;
      color: rgba(255,247,239,0.55);
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .card {
        padding: 50px 28px;
      }

      .logo {
        font-size: 3.5rem;
      }

      .headline {
        font-size: 2.2rem;
      }

      .subtitle {
        letter-spacing: 3px;
      }

      .description {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="gold-line"></div>
    <div class="gold-line"></div>
  </div>

  <div class="container">
    <div class="card">
      <div class="logo">El Suizo</div>
      <div class="divider"></div>

      <div class="subtitle">Guatemala • Swiss Inspired Craftsmanship</div>

      <h1 class="headline">
        The Finest Caramel<br>
        in Central America
      </h1>

      <p class="description">
        A new premium confectionery experience is arriving soon.
        Handcrafted caramel inspired by Swiss tradition, made with exceptional ingredients and timeless passion.
      </p>

      <div class="badge">Opening Soon</div>

      <div class="footer">
        © El Suizo — Crafted in Guatemala
      </div>
    </div>
  </div>
</body>
</html>
